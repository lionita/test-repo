spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auctiondb
    username: auction
    password: auction
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: auction
    show-sql: false
  flyway:
    enabled: true
    baselineOnMigrate: true
    locations: classpath:db/migration
    schemas: auction
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example-issuer.local/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-}] [trace:%X{traceId:-}] [span:%X{spanId:-}]"

auction:
  bidders:
    block-duration-months: 2
